<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>国脉院区车位状态</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0f14;
      color: #e8eaf0;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    header {
      width: 100%;
      max-width: 680px;
      padding: 28px 20px 0;
      text-align: center;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #f0f2f8;
    }

    .divider {
      width: 40px;
      height: 3px;
      background: linear-gradient(90deg, #3b82f6, #6366f1);
      border-radius: 2px;
      margin: 12px auto 0;
    }

    main {
      width: 100%;
      max-width: 680px;
      padding: 24px 20px 36px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: #161920;
      border: 1px solid #1f2330;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.45);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
    }

    .card img {
      display: block;
      width: 640px;
      height: 360px;
      max-width: 100%;
      object-fit: cover;
    }

    .empty {
      text-align: center;
      padding: 80px 20px;
      color: #3a3f50;
      font-size: 14px;
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    /* PC: 宽屏时图片保持 640px 固定宽度居中 */
    @media (min-width: 700px) {
      .card img {
        width: 640px;
        height: 360px;
      }
    }

    /* 移动端: 图片宽度撑满卡片，高度等比 */
    @media (max-width: 699px) {
      .card img {
        width: 100%;
        height: auto;
        aspect-ratio: 16 / 9;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>国脉院区车位状态</h1>
    <div class="divider"></div>
  </header>

  <main id="main"></main>

  <script>
    (async () => {
      const main = document.getElementById('main');
      const params = new URLSearchParams(location.search);

      function showEmpty(msg) {
        main.innerHTML = `<div class="empty"><div class="empty-icon">📷</div>${msg}</div>`;
      }

      if (!params.has('d')) {
        showEmpty('未提供图片参数');
        return;
      }

      try {
        const raw = atob(decodeURIComponent(params.get('d')));
        const bytes = Uint8Array.from(raw, c => c.charCodeAt(0));
        const ds = new DecompressionStream('gzip');
        const writer = ds.writable.getWriter();
        writer.write(bytes);
        writer.close();
        const reader = ds.readable.getReader();
        const chunks = [];
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
        }
        const total = chunks.reduce((s, c) => s + c.length, 0);
        const buf = new Uint8Array(total);
        let off = 0;
        for (const c of chunks) { buf.set(c, off); off += c.length; }
        const data = JSON.parse(new TextDecoder().decode(buf));

        [data.image2, data.image1].forEach((url, i) => {
          if (!url) return;
          const card = document.createElement('div');
          card.className = 'card';
          const img = document.createElement('img');
          img.src = url;
          img.alt = '摄像头 ' + (i + 1);
          img.loading = 'lazy';
          card.appendChild(img);
          main.appendChild(card);
        });

        if (!main.children.length) showEmpty('暂无图片');
      } catch (e) {
        showEmpty('数据解析失败：' + e.message);
      }
    })();
  </script>
</body>
</html>
